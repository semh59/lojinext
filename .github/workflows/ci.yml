        #   `WHERE false`, always empty) now `~Model.is_deleted`, and
        #   SoforRepository.bulk_soft_delete called a non-existent bulk_update
        #   (AttributeError) — bulk_update now implemented; 6 cleared + 3 bugs).
        # - 2026-06-11: 108 (ARCH-004 slice 9: ensemble_core sample_weights typed
        #   Any (list-then-ndarray rebind; dropped 4 stale/mismatched type:ignore
        #   for .min()/.max()/.mean() + fancy index) + yakit_tahmin_service
        #   retrain_all_models results dict typed Dict[str, Any]; 7 cleared,
        #   pure typing).
        # - 2026-06-11: 102 (ARCH-004 slice 10: benchmark (metrics dict +
        #   predictions_5 list->ndarray Any) + export_service (EXPORT_DIR uses
        #   staticmethod directly callable on py3.10+ instead of .__func__;
        #   templates typed Dict[str, Dict[str, list]] so t_data is indexable);
        #   6 cleared, pure typing).
        # - 2026-06-11: 95 (ARCH-004 slice 11: time_series_predictor (conditional
        #   torch base class type:ignore[misc], training_history/feature_std
        #   annotated) + lightgbm_predictor (training_stats/feature_importance_
        #   Dict[str, Any]) + notification_repository (cast CursorResult.rowcount
        #   x2); 7 cleared, pure typing).
        # - 2026-06-11: 89 (ARCH-004 slice 12: config_repo real bug (get_all
