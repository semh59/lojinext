name: CI Hard Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manuel trigger — E2E gate'i sadece burada çalışır
    inputs:
      run_load_test:
        description: "Locust yük testini koş (GO gate #4)"
        type: boolean
        default: false
      lt_users:
        description: "Eş-zamanlı sanal kullanıcı (pilot 3-5x)"
        default: "50"
      lt_spawn:
        description: "Saniyede spawn rate"
        default: "10"
      lt_time:
        description: "Süre (örn. 120s, 5m)"
        default: "120s"

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-hard-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hard-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lojinext_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d lojinext_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key
      PII_ENCRYPTION_KEY: GL-BaajLCs-r2dCZ55yWHtCv0bxYyzmQ1A3RE4JLNjs=  # pragma: allowlist secret
      ADMIN_PASSWORD: test-admin-password
      # E2E login: super-admin bypass uses SUPER_ADMIN_PASSWORD; ADMIN_PASSWORD
      # alone is not enough since the bypass only reads SUPER_ADMIN_PASSWORD.
      # Integration tests wipe the DB (DROP SCHEMA), so no admin user exists
      # when uvicorn starts for Playwright — bypass avoids any DB lookup.
      SUPER_ADMIN_PASSWORD: test-admin-password
      # CI postgres service POSTGRES_USER=postgres ile başlatılıyor; conftest
      # `_reset_public_schema` GRANT için POSTGRES_USER env'ini okuyor —
      # default `lojinext_user` rol'ü CI'da yok, bu env explicit set'lenir.
      POSTGRES_USER: postgres
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/lojinext_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/lojinext_test
      OPENROUTESERVICE_API_KEY: dummy_test_key
      OPENROUTE_API_KEY: dummy_test_key
      # localhost:3000 ŞART: vitest real-backend testleri jsdom'da koşuyor ve
      # jsdom origin'i http://localhost:3000 — CORS'ta yoksa axios "Cross
      # origin forbidden" ile düşer, isRealBackendReachable() false döner ve
      # 80+ real-backend suite'i SESSİZCE skip olur (2026-07-04 bulgusu).
      CORS_ORIGINS: http://localhost,http://localhost:3000
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Gitleaks scans the pushed commit range (firstCommit^..lastCommit).
          # The default shallow clone (depth 1) omits the range base, so a
          # multi-commit push fails with "unknown revision". Full history makes
          # the real secret scan run over the whole range instead of erroring.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            app/requirements.txt
            app/requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Dependency source contract gate
        run: |
          python - <<'PY'
          from pathlib import Path

          lines = [
              line.strip()
              for line in Path("requirements.txt").read_text(encoding="utf-8-sig").splitlines()
              if line.strip() and not line.strip().startswith("#")
          ]
          expected = ["-r app/requirements.txt"]
          if lines != expected:
              raise SystemExit(
                  f"requirements.txt drift detected. expected={expected}, found={lines}"
              )
          print("Dependency source contract OK: requirements.txt -> app/requirements.txt")
          PY

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r app/requirements-dev.txt

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Frontend codegen (orval)
        # Generated files are gitignored; regenerate from committed openapi.json
        # so subsequent lint/build/test steps can resolve the generated imports.
        run: npm --prefix frontend run codegen

      - name: Runtime dependency smoke (Celery)
        run: |
          python - <<'PY'
          import celery
          from v2.modules.platform_infra.background.celery_app import celery_app

          print(f"Celery import OK: version={celery.__version__}")
          print(f"Celery app OK: name={celery_app.main}")
          PY

      - name: Forbidden model references gate (qwen/gpt4all)
        run: |
          if git grep -n -i -E "qwen|gpt4all" -- ':!.github/workflows/ci.yml' ':!CLAUDE.md'; then
            echo "Forbidden model references detected (qwen/gpt4all)."
            exit 1
          fi
          echo "Forbidden model references gate passed."

      - name: Forbidden FakeUnitOfWork helper gate
        run: |
          # The shared FakeUnitOfWork/patch_unit_of_work helper was deleted in
          # the 0-mock epic: it let unit tests fake the DB transaction and hid
          # real prod bugs (admin import NOT-NULL 500s). DB-touching unit tests
          # must seed real rows (app/tests/_helpers/seed.py) instead.
          # Scope to app/tests only — docs/ legitimately discuss the deleted helper.
          if git grep -n -E "patch_unit_of_work|app\.tests\._helpers\.uow_mock" -- 'app/tests'; then
            echo "Re-introduced FakeUnitOfWork helper — use real seeded rows instead."
            exit 1
          fi
          echo "FakeUnitOfWork helper gate passed."

      - name: Backend import smoke
        run: python -c "import app.main"

      - name: Migrate database to head
        run: alembic upgrade head
        env:
          PGOPTIONS: "-c lock_timeout=3s -c statement_timeout=120s"

      - name: Alembic parity gate
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys

          def parse_heads():
              output = subprocess.check_output(["alembic", "heads"], text=True)
              revisions = []
              for line in output.splitlines():
                  match = re.match(r"^([A-Za-z0-9_]+)\b", line.strip())
                  if match:
                      revisions.append(match.group(1))
              return revisions

          def parse_current():
              output = subprocess.check_output(["alembic", "current", "--verbose"], text=True)
              match = re.search(r"^Rev:\s+([A-Za-z0-9_]+)\b", output, flags=re.MULTILINE)
              if not match:
                  print(f"Alembic parity failed: could not parse current revision from output:\n{output}")
                  sys.exit(1)
              return [match.group(1)]

          heads = parse_heads()
          current = parse_current()

          if len(heads) != 1:
              print(f"Alembic parity failed: expected exactly 1 head, found {heads}")
              sys.exit(1)

          if current != heads:
              print(f"Alembic parity failed: current={current}, head={heads}")
              sys.exit(1)

          print(f"Alembic parity OK: {heads[0]}")
          PY

      - name: Alembic drift gate
        run: alembic --raiseerr check

      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LOG_OPTS: --all

      - name: Security scan — Python (pip-audit)
        # Blocking: known CVEs in production dependencies must be fixed or
        # explicitly suppressed via --ignore-vuln with a documented reason.
        #
        # PYSEC-2026-161 (starlette<1.0.1): prometheus-fastapi-instrumentator
        # 7.1.0 starlette<1.0.0'a pin'li → upgrade upstream-blocked.
        # Tracked: instrumentator next release'i çıkınca starlette 1.0.1+'a geç
        # ve bu ignore'u kaldır.
        #
        # CVE-2025-3000 (torch 2.12.0): fix sürümü YOK (pip-audit "Fix Versions"
        # boş) ve torch transitive bir ML bağımlılığı (sentence-transformers).
        # Exploit yolu güvenilmeyen model dosyası yüklemek; bu uygulama modelleri
        # kendi eğitip yüklüyor (harici untrusted .pt yok) → pratik risk düşük.
        # Tracked: torch fix sürümü çıkınca bump et ve bu ignore'u kaldır.
        # Suppression review date: 2026-09-21 (3 months) — re-audit all ignores.
        run: |
          pip-audit --requirement app/requirements.txt \
            --ignore-vuln CVE-2025-3000 \
            --ignore-vuln PYSEC-2025-185 \
            --ignore-vuln PYSEC-2024-277 \
            --ignore-vuln PYSEC-2025-189 \
            --ignore-vuln PYSEC-2025-190 \
            --ignore-vuln PYSEC-2025-191 \
            --ignore-vuln PYSEC-2025-192 \
            --ignore-vuln PYSEC-2025-193 \
            --ignore-vuln PYSEC-2025-194 \
            --ignore-vuln PYSEC-2025-195 \
            --ignore-vuln PYSEC-2025-196 \
            --ignore-vuln PYSEC-2025-197 \
            --ignore-vuln PYSEC-2025-210 \
            --ignore-vuln PYSEC-2026-139 \
            --ignore-vuln PYSEC-2025-211 \
            --ignore-vuln PYSEC-2025-212 \
            --ignore-vuln PYSEC-2025-213 \
            --ignore-vuln PYSEC-2025-214 \
            --ignore-vuln PYSEC-2025-215 \
            --ignore-vuln PYSEC-2025-216 \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln PYSEC-2025-218 \
            --ignore-vuln PYSEC-2026-161

      - name: Security scan — npm audit
        # Blocking at high severity: moderate/low advisories are informational.
        run: npm --prefix frontend audit --omit=dev --audit-level=high

      - name: Backend lint (ruff)
        # E501 is enforced via ruff.toml (lint.pycodestyle.max-line-length=120);
        # format target stays 88. Legacy unbreakable lines carry explicit
        # `# noqa: E501`.
        run: ruff check app/ --select=E,F,W,I

      - name: Import boundary gate (modular monolith)
        # Promoted to a real blocking gate 2026-07-21 (dalga 16 audit) — see
        # TASKS/faz0-baseline-olcum-ve-rapor-modu.md and
        # TASKS/faz1-import-linter-baseline-ve-gate.md. Covers the 18 v2/
        # contracts (1 independence + 1 layers + 15 public-surface-only for
        # every business module: location, route_simulation, notification,
        # fleet, fuel, driver, auth_rbac, anomaly, import_excel, reports,
        # analytics_executive, ai_assistant, prediction_ml, trip,
        # admin_platform + 1 public-surface-only-platform_infra, added
        # 2026-07-22 once dalga 17 landed — same pattern as every module
        # before it). The pre-existing legacy `report-only` contract
        # (app.core.services vs app.services drift) was REMOVED from
        # .importlinter 2026-07-22 once `app.core.services` stopped
        # existing entirely (its last file moved into v2/modules/location/)
        # — the independence check it tracked became moot, so there is no
        # longer a separate non-blocking report step below.
        #
        # shared_kernel (dalga 16) deliberately has NO public-surface-only
        # contract of its own (documented exemption — see
        # v2/modules/shared_kernel/CLAUDE.md — the whole point of that
        # module is that everyone imports it freely), so it stays out of
        # this list on purpose, not because it's unfinished.
        run: |
          lint-imports --config .importlinter \
            --contract module-cross-domain-infra-independence \
            --contract module-internal-layers \
            --contract public-surface-only-location \
            --contract public-surface-only-route_simulation \
            --contract public-surface-only-notification \
            --contract public-surface-only-fleet \
            --contract public-surface-only-fuel \
            --contract public-surface-only-driver \
            --contract public-surface-only-auth_rbac \
            --contract public-surface-only-anomaly \
            --contract public-surface-only-import_excel \
            --contract public-surface-only-reports \
            --contract public-surface-only-analytics_executive \
            --contract public-surface-only-ai_assistant \
            --contract public-surface-only-prediction_ml \
            --contract public-surface-only-trip \
            --contract public-surface-only-admin_platform \
            --contract public-surface-only-platform_infra

      - name: Backend type check (mypy)
        # Soft-baseline gate: fails only if the error count GROWS beyond the
        # known pre-existing count.
        # - 2026-05-18: 175 (batch-1 cleanup baseline)
