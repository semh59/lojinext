      - name: Backend unit tests
        # testpaths in pytest.ini covers both tests/ and app/tests/.
        # NOTE: xdist (-n 2) denendi (b00b55ad) ama tests/ kökündeki
        # DB-touching test'ler (TestVehicleAPI vb.) integration marker'sız;
        # iki worker aynı lojinext_test DB'sine racing — conftest'in
        # _terminate_other_test_connections çağrısı diğer worker'ın
        # backend'ini öldürüyor → ConnectionDoesNotExistError. Geri
        # alındı. Speedup için per-worker DB veya per-worker schema
        # gerek (follow-up).
        #
        # Tier F madde 37 (2026-07-03): 46 app/tests/unit dosyası gerçekten
        # gerçek DB'ye vuruyordu ama @pytest.mark.integration TAŞIMIYORDU —
        # bu "hızlı/mock'lu" lane'i fiilen sahteleştiriyordu. Artık doğru
        # işaretlendiler (bkz. app/tests/unit/**, pytestmark = pytest.mark.
        # integration) ve bu run'dan çıktılar — bu yüzden bu adımın kendi
        # --cov-fail-under'ı 92'den 85'e düşürüldü (gerçek ölçüm: %86.92,
        # yerel throwaway Postgres'e karşı 2026-07-03'te kanıtlandı). Asıl
        # %92 hedefi artık AŞAĞIDAKİ "Combined coverage gate" adımında,
        # unit+tüm integration adımlarının BİRLEŞİK verisiyle uygulanıyor —
        # tek başına bu adım artık nihai gate DEĞİL.
        # 2026-07-04 kalibrasyonu: %86.92 ölçümünden SONRA da marker-fix
        # commit'leri unit lane'den test taşıdı (örn. lokasyon_service
        # 14:13'teki commit) → gerçek unit-lane değeri CI'da %84, lokalde
        # %83.61 ölçüldü; 85 gate'i hiç yeşil olmadı. 83'e çekildi —
        # nihai kalite gate'i değişmeden Combined %92'de kalıyor.
        run: pytest -m "unit or not integration" -q --tb=short --ignore=tests/integration --ignore=app/tests/integration --cov=app --cov=v2 --cov-report=term-missing --cov-fail-under=83 --cov-config=pytest.ini

      # ---- 0-mock Faz 2: vitest real-backend testleri gerçek backend ister ----
      # (docker-github plan Bölüm 3'ün CI ayağı.) Sıra: taze DB (alembic ile,
      # migration 0002 gerçek admin'i seed eder — testler seed'li admin'e
      # hizalı) → api-stub → uvicorn backend. Aynı backend aşağıda OpenAPI
      # drift + Playwright E2E için de kullanılır (eski ayrı start adımı
      # kaldırıldı).
      - name: Create vitest DB + migrate (seeds real admin)
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c 'CREATE DATABASE lojinext_vitest'
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/lojinext_vitest alembic upgrade head

      - name: Start api-stub (deterministic external-API canned responses)
        run: |
          pip install -q -r api_stub/requirements.txt
          (cd api_stub && nohup uvicorn main:app --host 127.0.0.1 --port 9000 > /tmp/api_stub.log 2>&1 &)
          for i in $(seq 1 15); do
            curl -sf http://127.0.0.1:9000/health && echo "api-stub ready" && break
            echo "Waiting for api-stub... ($i/15)" && sleep 2
          done

      - name: Start backend (vitest real-backend + OpenAPI drift + E2E)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/lojinext_vitest
          # Dummy anahtar ŞART: MapboxClient anahtar yoksa stub'a bile
          # gitmeden "API Key missing" ile iptal eder → /routes/simulate 502
          # (2026-07-07 lokal CI-simülasyonunda yakalandı). Stub auth'a bakmaz.
          MAPBOX_API_KEY: dummy_test_key
          MAPBOX_API_BASE_URL: http://127.0.0.1:9000/directions/v5/mapbox/driving-traffic
          OPENROUTE_API_BASE_URL: http://127.0.0.1:9000/v2
          OPEN_METEO_API_BASE_URL: http://127.0.0.1:9000/v1/elevation
          TELEGRAM_API_BASE_URL: http://127.0.0.1:9000
          GROQ_API_BASE_URL: http://127.0.0.1:9000/openai/v1
          # subscribe/vapid-public-key akışı sadece non-empty kontrol eder;
          # gerçek imza yalnız push GÖNDERİMİNDE gerekir — dummy yeterli.
          VAPID_PUBLIC_KEY: ci-test-vapid-public-key
          VAPID_PRIVATE_KEY: ci-test-vapid-private-key
          VAPID_SUBJECT: "mailto:ci@lojinext.test"
          # Default False — VAPID tek başına yetmiyor, flag açılmazsa
          # /push/vapid-public-key push_enabled=false döner ve
          # usePushNotifications real-backend testleri düşer.
          PUSH_NOTIFICATION_ENABLED: "True"
          # Break-glass bucket'ı (prod default 3/300s) CI'da yükselt: vitest
          # real-backend suit'leri + Playwright E2E meşru olarak onlarca kez
          # login olur; 3'lük bucket E2E'nin 4. testinden itibaren herkese
          # 429 döndürdü (run 28859004840). Prod default'u DEĞİŞMEDİ.
          SUPER_ADMIN_LOGIN_RATE: "1000"
        run: |
          # Log dosyaya: arka plan sürecinin çıktısı step bitince kaybolur —
          # vitest sırasında oluşan 500'lerin traceback'i ancak böyle görülür
          # (2026-07-07: GET /vehicles/ 500'ü teşhis edilemedi, tek iz buydu).
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn-vitest.log 2>&1 &
          echo "UVICORN_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health/liveness && echo "Backend ready" && break
            echo "Waiting for backend... ($i/30)" && sleep 2
          done

      - name: Frontend — Unit tests with coverage
        env:
          REAL_BACKEND_URL: http://127.0.0.1:8000
          REAL_BACKEND_ADMIN_USER: admin
          REAL_BACKEND_ADMIN_PASSWORD: test-admin-password
        # maxForks=1 ŞART: real-backend suit'leri tek backend'i paylaşıyor —
        # paralel fork'larda (2026-07-05/07, 6 tam koşum) her koşumda FARKLI
        # dosyalar üç sınıf flake'le düştü: (a) süper-admin login bucket'ına
        # thundering herd (3 istek/300s), (b) yük-bağımlı timeout'lar,
        # (c) dosyalar arası veri yarışı (ör. PlanWizard top-N sıralamasında
        # başka dosyanın araçları). Seri koşum üç sınıfı da kökten kapatır.
        # singleFork DEĞİL: tek process 100+ jsdom ortamının belleğini
        # biriktirip sessizce ölüyor (2026-07-07'de canlı yakalandı) —
        # maxForks=1 her dosyaya taze process verir, sıra korunur.
        run: cd frontend && npm run test:cov -- --poolOptions.forks.minForks=1 --poolOptions.forks.maxForks=1

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-html
          path: frontend/coverage/
          retention-days: 14

      - name: Integration — DB schema integrity
        run: pytest app/tests/integration/test_db_schema_integrity.py -m integration -x -q --tb=short --timeout=60 --cov=app --cov=v2 --cov-append --cov-fail-under=0 --cov-config=pytest.ini

      - name: Integration — API contracts
        run: pytest app/tests/integration/test_api_contracts.py -m integration -x -q --tb=short --timeout=60 --cov=app --cov=v2 --cov-append --cov-fail-under=0 --cov-config=pytest.ini

      - name: Integration — Business lifecycle
        run: pytest app/tests/integration/test_business_lifecycle.py -m integration -x -q --tb=short --timeout=60 --cov=app --cov=v2 --cov-append --cov-fail-under=0 --cov-config=pytest.ini

      - name: Security — RBAC coverage
        run: pytest app/tests/security/test_rbac_coverage.py -x -q --tb=short --timeout=30 --cov=app --cov=v2 --cov-append --cov-fail-under=0 --cov-config=pytest.ini

      - name: Integration — ML/AI pipeline
        run: pytest app/tests/integration/test_ml_ai_pipeline.py -m integration -x -q --tb=short --timeout=60 --cov=app --cov=v2 --cov-append --cov-fail-under=0 --cov-config=pytest.ini

      - name: Integration — remaining (legacy + other integration tests, includes Tier F madde 37's 46 reclassified files)
        run: pytest -m "integration" -q --tb=short --timeout=60 --ignore=app/tests/integration/test_db_schema_integrity.py --ignore=app/tests/integration/test_api_contracts.py --ignore=app/tests/integration/test_business_lifecycle.py --ignore=app/tests/integration/test_ml_ai_pipeline.py --ignore=app/tests/security/test_rbac_coverage.py --cov=app --cov=v2 --cov-append --cov-fail-under=0 --cov-config=pytest.ini || { code=$?; [ "$code" = "5" ] && echo "No remaining integration tests collected (OK)" || exit $code; }

      - name: Deep audit tests (auth isolation + integrity, excluding stress)
        run: pytest tests/deep_audit/ -m "not stress" -q --tb=short --cov=app --cov=v2 --cov-append --cov-fail-under=0 --cov-config=pytest.ini

      # Tier F madde 37 (2026-07-03): asıl %92 coverage hedefi burada,
      # yukarıdaki unit adımı + TÜM integration adımlarının aynı .coverage
      # dosyasına (--cov-append, aynı job/runner/filesystem — coverage
      # combine'a gerek yok) biriktirdiği GERÇEK birleşik veriyle
      # uygulanıyor. Gerçek ölçüm (2026-07-03, tüm test'ler tek pytest
      # invocation'ında, yerel throwaway Postgres'e karşı): %92.68 — 92
      # eşiği güvenli marjla karşılanıyor.
      - name: Combined coverage gate (unit + integration, real %92 target)
        run: |
          python -m coverage report --rcfile=pytest.ini --fail-under=92
          python -m coverage html --rcfile=pytest.ini -d htmlcov

      # Tier E madde 29 — htmlcov/ used to only ever exist as a stale local
      # artifact from one-off manual coverage sprints (last touched over a
      # month before this fix), never regenerated or published by CI. Every
      # run now uploads the current report so "what's actually covered" is
      # always one click away instead of "run pytest locally and hope your
      # checkout is current." Tier F madde 37: this now reflects the
      # combined unit+integration total, not just the unit-only lane.
      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: htmlcov/
          retention-days: 14

      # "Frontend tests" adımı KALDIRILDI (2026-07-07): birebir aynı suite
      # yukarıdaki "Frontend — Unit tests with coverage" adımında zaten
      # koşuyor (coverage + seri kararlılıkla, yani daha güçlü haliyle).
      # Mock çağında bu kopya zararsızdı; backend artık vitest sırasında
      # ayakta olduğundan ikinci koşum token-cache TTL'i (10 dk) dolmuş
      # halde + paralel fork'larla süper-admin login bucket'ına (3/300s)
      # herd yapıp 20+ real-backend suite'ini topluca 429 ile düşürdü
      # (run 28854607316). Gate zayıflaması değil, kopyanın kaldırılması.

      - name: Frontend build
        run: npm --prefix frontend run build

      - name: Dump vitest backend log on failure
        if: failure()
        run: |
          # ERROR/traceback satırları AYRICA: 300 satırlık kuyruk istek
          # gürültüsüyle doluyor ve asıl exception'ı kaçırıyor (run
          # 28879415763'te POST /trips/ 500'ünün trace'i dump'a girmedi).
          echo "=== uvicorn ERROR/exception satırları (son 200) ==="
          grep -nE "ERROR|CRITICAL|Traceback|Exception|raise " /tmp/uvicorn-vitest.log 2>/dev/null | tail -200 || echo "ERROR satırı yok"
          echo "=== uvicorn ERROR bağlamı (B2/A20) ==="
          grep -B2 -A 20 -E "\| ERROR|Traceback" /tmp/uvicorn-vitest.log 2>/dev/null | tail -300 || echo "bağlam yok"
          echo "=== uvicorn son 150 satır ==="
          tail -150 /tmp/uvicorn-vitest.log 2>/dev/null || echo "log yok"
          echo "=== api-stub son 50 satır ==="
          tail -50 /tmp/api_stub.log 2>/dev/null || echo "log yok"

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend type-check (incl. tests)
        # `build` only type-checks src via tsconfig.app.json; this runs the root
        # tsconfig (tests included) so test-file type drift is caught (was 68
        # silent errors before this gate).
        run: npm --prefix frontend run type-check

      - name: OpenAPI schema drift check
        # Dumps openapi.json from the running backend and verifies it matches
        # what is committed. Fails if the schema was edited by hand or if a
        # backend change wasn't reflected in the committed spec.
        run: |
          API_BASE_URL=http://127.0.0.1:8000 npm --prefix frontend run codegen:dump
          git diff --exit-code frontend/openapi.json

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install chromium --with-deps

      - name: Frontend E2E tests
        # Tur 5 #145'te hizalandı: 23 fail → 0 fail (90 pass + 11 skipped).
        # Skip'liler: FleetPage sürücü tab kaldırıldı + AlertsPage / Trips
        # modal / Predictions XAI refactor sonrası eski test'ler deprecated;
        # ayrı epic'te yeniden yazılır.
        run: npm --prefix frontend run test:e2e
        env:
          E2E_USERNAME: admin
          E2E_PASSWORD: test-admin-password

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Telegram CI Bildirimi
        if: failure()
        run: |
          MSG=$(printf "🔴 CI HATA\nRepo: %s\nBranch: %s\nCommit: %s\nWorkflow: %s\nLink: %s" \
            "${{ github.repository }}" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.workflow }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_OPS_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_OPS_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" \
            || true

      - name: Stop backend
        if: always()
        run: kill $UVICORN_PID || true

  publish:
    name: Build & Push to GHCR
    needs: hard-gates
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 2026-07-10: repeated "No space left on device" failures building the
      # backend image (it bundles CUDA/torch/xgboost/lightgbm/faiss — see the
      # Trivy step's usr/local/cuda skip-dir below) exhausted the runner's
      # default ~14GB free space, twice in a row on unrelated commits. Free
      # up the preinstalled toolchains ubuntu-latest ships that this job
      # never uses (~30GB reclaimed) before the build layer cache and image
      # start competing for the same disk.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker image prune -af || true
          df -h /

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "IMAGE_TAG=${BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lojinext-backend
          tags: |
            type=raw,value=${{ steps.tag.outputs.IMAGE_TAG }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy CVE scan ─────────────────────────────────────────────────────
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/lojinext-backend:${{ steps.tag.outputs.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          timeout: "15m"
          skip-dirs: "usr/local/lib/python3.12/site-packages/nvidia,usr/local/cuda"

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lojinext-frontend
          tags: |
            type=raw,value=${{ steps.tag.outputs.IMAGE_TAG }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          build-args: VITE_API_URL=/api/v1
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Staging auto-deploy (develop → staging VPS)
  # Requires GitHub Secrets: STAGING_HOST, STAGING_SSH_KEY, STAGING_USER,
  # STAGING_DEPLOY_PATH
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.STAGING_DEPLOY_PATH }}"
            export IMAGE_TAG="${{ needs.publish.outputs.image_tag }}"
            export GHCR_OWNER="${{ github.repository_owner }}"
            echo "[deploy-staging] IMAGE_TAG=$IMAGE_TAG"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm \
              -e ENVIRONMENT=staging backend alembic upgrade head
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build \
              backend frontend worker celery-beat
            docker image prune -f --filter "until=24h"
            echo "[deploy-staging] done"

      - name: Smoke test staging
        run: |
          for i in $(seq 1 12); do
            curl -sf "https://${{ secrets.STAGING_HOST }}/api/v1/health/" --max-time 10 && break
            echo "[$i/12] not ready yet, waiting 10s..."
            sleep 10
          done
          curl -f "https://${{ secrets.STAGING_HOST }}/api/v1/health/" --max-time 10

  # ──────────────────────────────────────────────────────────────────────────
  # Production auto-deploy (main → prod VPS)
  # Requires GitHub Secrets: PROD_HOST, PROD_SSH_KEY, PROD_USER,
  # PROD_DEPLOY_PATH
  # GitHub Environment "production" should have required-reviewer protection.
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}

    steps:
      - name: Deploy to production via SSH
        if: env.PROD_HOST
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.PROD_DEPLOY_PATH }}"
            export IMAGE_TAG="${{ needs.publish.outputs.image_tag }}"
            export GHCR_OWNER="${{ github.repository_owner }}"
            echo "[deploy-prod] IMAGE_TAG=$IMAGE_TAG"
            # Pull first while old containers still serve (minimal downtime)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend
            # Run migrations before swap
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm \
              backend alembic upgrade head
            # Swap containers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build \
              backend frontend worker celery-beat
            docker image prune -f --filter "until=24h"
            echo "[deploy-prod] done"

      - name: Smoke test production
        if: env.PROD_HOST
        run: |
          for i in $(seq 1 12); do
            curl -sf "https://${{ secrets.PROD_HOST }}/api/v1/health/" --max-time 10 && break
            echo "[$i/12] not ready yet, waiting 10s..."
            sleep 10
          done
          curl -f "https://${{ secrets.PROD_HOST }}/api/v1/health/" --max-time 10

      # Tier E madde 28 — a failed smoke test used to just fail the job while
      # the broken image_tag stayed live, serving traffic, until a human
      # noticed and manually redeployed the old tag. This step runs only when
      # a prior step in this job failed and puts the last known-good image
      # back automatically. It deliberately does NOT run `alembic downgrade`
      # — migrations here follow the project's backward-compatible/NOT VALID
      # convention specifically so the app can roll back without a schema
      # rollback; auto-downgrading is a real data-loss risk this workflow
      # will not take on unattended.
      - name: Rollback to last known-good image on failure
        if: failure() && env.PROD_HOST
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.PROD_DEPLOY_PATH }}"
            if [ ! -f .last_good_image_tag ]; then
              echo "[rollback-prod] No .last_good_image_tag on disk (first-ever deploy?) — nothing safe to roll back to. Manual intervention required."
              exit 1
            fi
            PREV_TAG=$(cat .last_good_image_tag)
            echo "[rollback-prod] Rolling back to last known-good IMAGE_TAG=$PREV_TAG"
            export IMAGE_TAG="$PREV_TAG"
            export GHCR_OWNER="${{ github.repository_owner }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build \
              backend frontend worker celery-beat
            echo "[rollback-prod] done — job still reports failure so this incident is not silently swallowed"

      # Only reached if every prior step succeeded — records this deploy as
      # the new rollback target for the *next* deploy's failure path above.
      - name: Record this deploy as the new rollback target
        if: success() && env.PROD_HOST
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd "${{ secrets.PROD_DEPLOY_PATH }}"
            echo "${{ needs.publish.outputs.image_tag }}" > .last_good_image_tag
            echo "[deploy-prod] Recorded new rollback target: $(cat .last_good_image_tag)"

  # ──────────────────────────────────────────────────────────────────────────
  # GO gate #4 — Locust yük testi (manuel: workflow_dispatch + run_load_test=true)
  # Temiz Linux + postgres:16 + redis:7 (şifresiz) → lokal Windows'un veremediği
  # geçerli latency ortamı. Eşik aşılırsa job FAIL (gerçek gate).
  # ──────────────────────────────────────────────────────────────────────────
  load-test:
    name: Load test (Locust, GO gate #4)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_load_test }}
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lojinext_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key
      PII_ENCRYPTION_KEY: GL-BaajLCs-r2dCZ55yWHtCv0bxYyzmQ1A3RE4JLNjs=  # pragma: allowlist secret
      ADMIN_PASSWORD: test-admin-password
      POSTGRES_USER: postgres
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/lojinext_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      CORS_ORIGINS: http://localhost
      PYTHONUNBUFFERED: "1"
      # Kapasite testi: rate-limit kapalı (tek-IP burst yoksa per-IP limit
      # sonucu domine eder — bkz. ilk koşu %23 429). Prod'da True kalır.
      RATE_LIMIT_ENABLED: "false"
      LT_P95_MS: "2000"
      LT_FAIL_PCT: "1.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install backend deps + locust
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r loadtest/requirements.txt

      - name: Migrate database to head
        run: alembic upgrade head

      - name: Start backend
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          echo "UVICORN_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health/liveness && echo "Backend ready" && break
            echo "Waiting for backend... ($i/30)" && sleep 2
          done

      - name: Run Locust load test
        env:
          LOAD_USER: admin
          LOAD_PASS: test-admin-password
        run: |
          locust -f loadtest/locustfile.py --host http://127.0.0.1:8000 \
            --headless \
            -u "${{ inputs.lt_users }}" \
            -r "${{ inputs.lt_spawn }}" \
            -t "${{ inputs.lt_time }}" \
            --csv loadtest/results --html loadtest/report.html --only-summary

      - name: Enforce thresholds (gate #4)
        run: python loadtest/check_thresholds.py loadtest/results

      - name: Upload load-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-results
          path: |
            loadtest/results_stats.csv
            loadtest/results_stats_history.csv
            loadtest/report.html
          retention-days: 14

      - name: Stop backend
        if: always()
        run: kill $UVICORN_PID || true
