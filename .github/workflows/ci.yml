        #   invalidation), admin_roles (RolRepository.create yetkiler List[str] ->
        #   Dict[str, bool], it's a dict column), locations (cast dict-list comp to
        #   Any for pydantic coercion); 3 cleared + 1 real bug.
        # - 2026-06-12: 44 (ARCH-004 slice 20: import_service YakitCreate — the 5
        #   errors are pydantic-mypy quirks (no pydantic.mypy plugin): litre/fiyat_tl
        #   float -> Decimal(str(...)) (matches pydantic's own coercion), explicit
        #   toplam_tutar=None / durum="Bekliyor" (mypy doesn't see Field defaults),
        #   depo_durumu cast to Any (Literal); 5 cleared, runtime-equivalent.
        # - 2026-06-12: 38 (ARCH-004 slice 21: trips.py (Body default_factory x2
        #   type:ignore[arg-type], risk_label/route_type str->Literal cast Any) +
        #   period_calculation_service (sum start 0.0 + PeriyotSeferMatch.toplam_mesafe
        #   int->float since it sums float distances, fiyat_tl Decimal(str())); 6
        #   cleared. trips.py 306/527 entity<->schema left for the sefer_write slice.
        # - 2026-06-12: 35 (ARCH-004 slice 22: ai_service.predict_trip_fuel real
        #   bugs (all mock-hidden): raw-string session.execute -> text(); predict()
        #   takes one context and returns one PredictionResult, code passed a [list]
        #   and indexed [0] -> predict(ctx) / res. Updated the 5 test methods that
        #   encoded the buggy list contract; 3 cleared + real bug fixed.
        # - 2026-06-12: 7 (ARCH-005: properly FIX (not mask) the sefer_write_service
        #   entity<->schema debt by unifying on the schemas model family — facade
        #   SeferService now imports SeferCreate/SeferUpdate from app.schemas.sefer;
        #   removed the 3 local entities-model imports in sefer_write_service so its
        #   constructions match the (schemas) method signatures. The residual
        #   call-arg "missing argument" errors are genuine pydantic-mypy false
        #   positives (all fields Optional; no pydantic.mypy plugin) -> line-level
        #   type:ignore[call-arg] on the 3 construction sites only. Plus durum
        #   str<->TripStatus and ALLOWED_TRANSITIONS str-enum-key casts. ~28 entity
        #   <->schema errors cleared properly; module stays fully type-checked.
        #   Local mypy = 1 (only insight_engine.bulk_create_alerts, a domain
        #   decision). Baseline 7 absorbs the local->CI gap — tighten once CI runs
        #   (Actions billing was blocked; verify edge-data validation strictness
        #   on the return-trip path with integration tests when CI is back).
        # New files must not introduce additional type errors.
        run: |
          set +e
          MYPY_OUT=$(python -m mypy app/ --ignore-missing-imports \
            --no-strict-optional --no-error-summary 2>&1)
          echo "$MYPY_OUT"
          ERRORS=$(echo "$MYPY_OUT" | grep -c ": error:" || true)
          BASELINE=7
          echo "mypy errors: $ERRORS / baseline: $BASELINE"
          if [ "$ERRORS" -gt "$BASELINE" ]; then
            echo "ERROR: mypy error count ($ERRORS) exceeds baseline ($BASELINE)."
            echo "Fix the new type errors before merging."
            exit 1
          fi

      - name: Backend unit tests
        # testpaths in pytest.ini covers both tests/ and app/tests/.
        # NOTE: xdist (-n 2) denendi (b00b55ad) ama tests/ kökündeki
        # DB-touching test'ler (TestVehicleAPI vb.) integration marker'sız;
        # iki worker aynı lojinext_test DB'sine racing — conftest'in
        # _terminate_other_test_connections çağrısı diğer worker'ın
        # backend'ini öldürüyor → ConnectionDoesNotExistError. Geri
        # alındı. Speedup için per-worker DB veya per-worker schema
        # gerek (follow-up).
        run: pytest -m "unit or not integration" -q --tb=short --ignore=tests/integration --ignore=app/tests/integration --cov=app --cov-report=term-missing --cov-fail-under=92 --cov-config=pytest.ini

      - name: Frontend — Unit tests with coverage
        run: cd frontend && npm run test:cov

      - name: Integration — DB schema integrity
        run: pytest app/tests/integration/test_db_schema_integrity.py -m integration -x -q --tb=short --timeout=60

      - name: Integration — API contracts
        run: pytest app/tests/integration/test_api_contracts.py -m integration -x -q --tb=short --timeout=60

      - name: Integration — Business lifecycle
        run: pytest app/tests/integration/test_business_lifecycle.py -m integration -x -q --tb=short --timeout=60

      - name: Security — RBAC coverage
        run: pytest app/tests/security/test_rbac_coverage.py -x -q --tb=short --timeout=30

      - name: Integration — ML/AI pipeline
        run: pytest app/tests/integration/test_ml_ai_pipeline.py -m integration -x -q --tb=short --timeout=60

      - name: Integration — remaining (legacy + other integration tests)
        run: pytest -m "integration" -q --tb=short --timeout=60 --ignore=app/tests/integration/test_db_schema_integrity.py --ignore=app/tests/integration/test_api_contracts.py --ignore=app/tests/integration/test_business_lifecycle.py --ignore=app/tests/integration/test_ml_ai_pipeline.py --ignore=app/tests/security/test_rbac_coverage.py || { code=$?; [ "$code" = "5" ] && echo "No remaining integration tests collected (OK)" || exit $code; }

      - name: Deep audit tests (auth isolation + integrity, excluding stress)
        run: pytest tests/deep_audit/ -m "not stress" -q --tb=short

      - name: Frontend tests
        run: npm --prefix frontend run test -- --run

      - name: Frontend build
        run: npm --prefix frontend run build

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend type-check (incl. tests)
        # `build` only type-checks src via tsconfig.app.json; this runs the root
        # tsconfig (tests included) so test-file type drift is caught (was 68
        # silent errors before this gate).
        run: npm --prefix frontend run type-check

      - name: Start backend for E2E tests
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          echo "UVICORN_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health/liveness && echo "Backend ready" && break
            echo "Waiting for backend... ($i/30)" && sleep 2
          done

      - name: OpenAPI schema drift check
        # Dumps openapi.json from the running backend and verifies it matches
        # what is committed. Fails if the schema was edited by hand or if a
        # backend change wasn't reflected in the committed spec.
        run: |
          API_BASE_URL=http://127.0.0.1:8000 npm --prefix frontend run codegen:dump
          git diff --exit-code frontend/openapi.json

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install chromium --with-deps

      - name: Frontend E2E tests
        # Tur 5 #145'te hizalandı: 23 fail → 0 fail (90 pass + 11 skipped).
        # Skip'liler: FleetPage sürücü tab kaldırıldı + AlertsPage / Trips
        # modal / Predictions XAI refactor sonrası eski test'ler deprecated;
        # ayrı epic'te yeniden yazılır.
        run: npm --prefix frontend run test:e2e
        env:
          E2E_USERNAME: admin
          E2E_PASSWORD: test-admin-password

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Telegram CI Bildirimi
        if: failure()
        run: |
          MSG=$(printf "🔴 CI HATA\nRepo: %s\nBranch: %s\nCommit: %s\nWorkflow: %s\nLink: %s" \
            "${{ github.repository }}" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.workflow }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_OPS_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_OPS_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" \
            || true

      - name: Stop backend
        if: always()
        run: kill $UVICORN_PID || true

  publish:
    name: Build & Push to GHCR
    needs: hard-gates
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "IMAGE_TAG=${BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lojinext-backend
          tags: |
            type=raw,value=${{ steps.tag.outputs.IMAGE_TAG }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy CVE scan ─────────────────────────────────────────────────────
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/lojinext-backend:${{ steps.tag.outputs.IMAGE_TAG }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          timeout: "15m"
          skip-dirs: "usr/local/lib/python3.12/site-packages/nvidia,usr/local/cuda"

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lojinext-frontend
          tags: |
            type=raw,value=${{ steps.tag.outputs.IMAGE_TAG }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          build-args: VITE_API_URL=/api/v1
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Staging auto-deploy (develop → staging VPS)
  # Requires GitHub Secrets: STAGING_HOST, STAGING_SSH_KEY, STAGING_USER,
  # STAGING_DEPLOY_PATH
  # ──────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.STAGING_DEPLOY_PATH }}"
            export IMAGE_TAG="${{ needs.publish.outputs.image_tag }}"
            export GHCR_OWNER="${{ github.repository_owner }}"
            echo "[deploy-staging] IMAGE_TAG=$IMAGE_TAG"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm \
              -e ENVIRONMENT=staging backend alembic upgrade head
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build \
              backend frontend worker celery-beat
            docker image prune -f --filter "until=24h"
            echo "[deploy-staging] done"

      - name: Smoke test staging
        run: |
          for i in $(seq 1 12); do
            curl -sf "https://${{ secrets.STAGING_HOST }}/api/v1/health/" --max-time 10 && break
            echo "[$i/12] not ready yet, waiting 10s..."
            sleep 10
          done
          curl -f "https://${{ secrets.STAGING_HOST }}/api/v1/health/" --max-time 10

  # ──────────────────────────────────────────────────────────────────────────
  # Production auto-deploy (main → prod VPS)
  # Requires GitHub Secrets: PROD_HOST, PROD_SSH_KEY, PROD_USER,
  # PROD_DEPLOY_PATH
  # GitHub Environment "production" should have required-reviewer protection.
  # ──────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}

    steps:
      - name: Deploy to production via SSH
        if: env.PROD_HOST
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.PROD_DEPLOY_PATH }}"
            export IMAGE_TAG="${{ needs.publish.outputs.image_tag }}"
            export GHCR_OWNER="${{ github.repository_owner }}"
            echo "[deploy-prod] IMAGE_TAG=$IMAGE_TAG"
            # Pull first while old containers still serve (minimal downtime)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend
            # Run migrations before swap
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm \
              backend alembic upgrade head
            # Swap containers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build \
              backend frontend worker celery-beat
            docker image prune -f --filter "until=24h"
            echo "[deploy-prod] done"

      - name: Smoke test production
        if: env.PROD_HOST
        run: |
          for i in $(seq 1 12); do
            curl -sf "https://${{ secrets.PROD_HOST }}/api/v1/health/" --max-time 10 && break
            echo "[$i/12] not ready yet, waiting 10s..."
            sleep 10
          done
          curl -f "https://${{ secrets.PROD_HOST }}/api/v1/health/" --max-time 10

  # ──────────────────────────────────────────────────────────────────────────
  # GO gate #4 — Locust yük testi (manuel: workflow_dispatch + run_load_test=true)
  # Temiz Linux + postgres:16 + redis:7 (şifresiz) → lokal Windows'un veremediği
  # geçerli latency ortamı. Eşik aşılırsa job FAIL (gerçek gate).
  # ──────────────────────────────────────────────────────────────────────────
  load-test:
    name: Load test (Locust, GO gate #4)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_load_test }}
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lojinext_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key
      ADMIN_PASSWORD: test-admin-password
      POSTGRES_USER: postgres
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/lojinext_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      CORS_ORIGINS: http://localhost
      PYTHONUNBUFFERED: "1"
      # Kapasite testi: rate-limit kapalı (tek-IP burst yoksa per-IP limit
      # sonucu domine eder — bkz. ilk koşu %23 429). Prod'da True kalır.
      RATE_LIMIT_ENABLED: "false"
      LT_P95_MS: "2000"
      LT_FAIL_PCT: "1.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install backend deps + locust
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r loadtest/requirements.txt

      - name: Migrate database to head
        run: alembic upgrade head

      - name: Start backend
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          echo "UVICORN_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health/liveness && echo "Backend ready" && break
            echo "Waiting for backend... ($i/30)" && sleep 2
          done

      - name: Run Locust load test
        env:
          LOAD_USER: admin
          LOAD_PASS: test-admin-password
        run: |
          locust -f loadtest/locustfile.py --host http://127.0.0.1:8000 \
            --headless \
            -u "${{ inputs.lt_users }}" \
            -r "${{ inputs.lt_spawn }}" \
            -t "${{ inputs.lt_time }}" \
            --csv loadtest/results --html loadtest/report.html --only-summary

      - name: Enforce thresholds (gate #4)
        run: python loadtest/check_thresholds.py loadtest/results

      - name: Upload load-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-results
          path: |
            loadtest/results_stats.csv
            loadtest/results_stats_history.csv
            loadtest/report.html
          retention-days: 14

      - name: Stop backend
        if: always()
        run: kill $UVICORN_PID || true
