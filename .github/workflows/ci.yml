        #   external_service (params dicts typed Dict[str, Any] for httpx) +
        #   celery_probe (Unix-only resource.getrusage type:ignore[attr-defined],
        #   already runtime-guarded); 6 cleared + 1 real bug.
        # - 2026-06-11: 84 (ARCH-004 slice 13: openroute_client (params Dict[str,
        #   Any] for httpx + _last_request_time 0.0 float) + prediction_tasks
        #   (cast sync-redis get -> bytes for json.loads; explicit re-raise after
        #   self.retry which always raises, fixes missing-return) + alarm_router
        #   (cast redis hincrby/hset to Awaitable[int]); 6 cleared, pure typing).
        # - 2026-06-11: 77 (ARCH-004 slice 14: advanced_lstm (conditional torch
        #   base classes + None-reassign of imported types type:ignore[misc] x4,
        #   history annotated) + anomaly_detector (X/y list->ndarray rebind Any);
        #   7 cleared, pure typing. NB: local->CI gap is ~6 not 5, baseline=local+6.)
        # - 2026-06-11: 70 (ARCH-004 slice 15: rate_limiter (Limiter None-reassign
        #   + _NoopLimiter type:ignore) + sofor_service (filters dict typed) +
        #   cache_manager (cast sync-redis get for pickle.loads) + smart_ai_service
        #   (SentenceTransformer None-reassign type:ignore[misc]) + prediction_service
        #   (entity_id int -> str); 7 cleared, pure typing).
        # - 2026-06-11: 63 (ARCH-004 slice 16: 6 files — event_bus (cast coroutine
        #   cb await), sefer_repo (rename clashing loop var), executive
        #   (MonteCarloBand.model_validate dict + cast risk_level Literal),
