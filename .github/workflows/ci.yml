        #   pure typing. (executive monte_carlo first used model_validate which
        #   broke a None-case test -> changed to cast; use cast not model_validate
        #   for response fields.)
        # - 2026-06-11: 57 (ARCH-004 slice 17: 6 files — groq_service + rag_engine
        #   (optional-import None reassign type:ignore[misc]), openroute_service
        #   (params Dict[str, Any]), sofor_pdf_service (Sequence->list),
        #   predictions (trend_data annotated), reports (Field default_factory
        #   type:ignore[arg-type]); 6 cleared, pure typing).
        # - 2026-06-11: 52 (ARCH-004 slice 18: 6 files — sofor_analiz_service
        #   (gather union narrow Exception->BaseException), anomaly_detection_service
        #   (tip="tuketim" -> AnomalyType.TUKETIM, + export AnomalyType from
