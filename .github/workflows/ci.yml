          echo "mypy errors: $ERRORS / baseline: $BASELINE"
          if [ "$ERRORS" -gt "$BASELINE" ]; then
            echo "ERROR: mypy error count ($ERRORS) exceeds baseline ($BASELINE)."
            echo "Fix the new type errors before merging."
