global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "telegram-ops"
  routes:
    - matchers:
        - severity = "critical"
      receiver: "telegram-ops"
      repeat_interval: 1h

    - matchers:
        - severity = "warning"
      receiver: "telegram-ops"
      repeat_interval: 4h

receivers:
  - name: "telegram-ops"
    webhook_configs:
      - url: "http://telegram-ops-bot:8080/webhook/alertmanager"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - alertname = "BackendDown"
    target_matchers:
      - alertname = "BackendHighErrorRate"
    equal: ["job"]
  - source_matchers:
      - alertname = "DatabaseDown"
    target_matchers:
      - alertname = "DatabaseTooManyConnections"
    equal: ["job"]
