global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "telegram-ops"
  routes:
    - matchers:
        - severity = "critical"
      receiver: "telegram-ops"
      repeat_interval: 1h

    - matchers:
        - severity = "warning"
      receiver: "telegram-ops"
      repeat_interval: 4h

receivers:
  - name: "telegram-ops"
    webhook_configs:
      - url: "http://telegram-ops-bot:8080/webhook/alertmanager"
        send_resolved: true
        http_config:
          # 2026-07-01 prod-grade denetimi P1: ops_bot artık bu secret
          # olmadan TÜM webhook isteklerini reddediyor (fail-closed).
          # Değer container başlarken OPS_WEBHOOK_SECRET env var'ından
          # /tmp/ops_webhook_secret'a yazılır (bkz. docker-compose.yml
          # alertmanager entrypoint) — repo'da hiçbir çıplak secret yok.
          authorization:
            credentials_file: /tmp/ops_webhook_secret

inhibit_rules:
  - source_matchers:
      - alertname = "BackendDown"
    target_matchers:
      - alertname = "BackendHighErrorRate"
    equal: ["job"]
  - source_matchers:
      - alertname = "DatabaseDown"
    target_matchers:
      - alertname = "DatabaseTooManyConnections"
    equal: ["job"]
