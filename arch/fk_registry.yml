# FAZ2 Wave 1 — cross-schema foreign key registry.
#
# Every foreign key here crosses a PostgreSQL schema boundary (the child
# table's schema differs from the parent table's schema). Each edge is a
# deliberate, reviewed cross-module dependency — adding a new cross-schema
# FK means adding a line here, which a PR reviewer sees. Same-schema
# (intra-module) FKs are NOT tracked here; there are 18 of those alongside
# these 42.
#
# Verified against a fully-migrated database (alembic upgrade head, 0001
# through 0061) via `python -m scripts.faz2_generate_fk_registry_seed` —
# see that script's docstring for the pg_constraint/pg_class/pg_namespace
# query. Diffed continuously by
# app/tests/integration/test_fk_registry_matches_live_schema.py (CI-blocking,
# symmetric — both an undocumented new edge and a stale registry entry fail).
#
# Two of these (platform.error_events.user_id/.resolved_by) live in
# v2/modules/shared_kernel/infrastructure/error_monitoring_models.py, not in
# any v2/modules/*/infrastructure/models.py file — easy to miss with a naive
# glob when auditing this list by hand.
