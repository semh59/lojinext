# Production Override — docker-compose.prod.yml
# Kullanım: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Bu dosya docker-compose.yml'i override eder:
#   - GHCR'dan pre-built image'lar kullanılır (build yerine)
#   - ENVIRONMENT=prod
#   - Internal servis portları dışarıya kapatılır
#   - Redis şifrelenir
#   - Resource limit'ler eklenir
#   - Log rotation aktif
#
# Required prod-only environment variables (compose validation fails fast if any are unset):
#   IMAGE_TAG                    — pinned container tag (no :latest in prod)
#   REDIS_PASSWORD               — Redis auth password (plain, used by redis-server only)
#   CELERY_BROKER_URL            — URL-encoded Redis URL e.g. redis://:pass%40@redis:6379/0
#   CELERY_RESULT_BACKEND        — URL-encoded Redis URL e.g. redis://:pass%40@redis:6379/1
#   REDIS_URL                    — URL-encoded Redis URL for app e.g. redis://:pass%40@redis:6379/0
#   POSTGRES_PASSWORD            — Postgres password (DB volume root)
#   GF_SECURITY_ADMIN_PASSWORD   — Grafana admin password
#   GHCR_OWNER                   — GitHub Container Registry org/owner (optional, defaults to "lojinext")
#
#   NOTE: Passwords with special chars (;/#/+) must be URL-encoded in *_URL vars.
#   Use: python3 -c "import urllib.parse; print(urllib.parse.quote('yourpass', safe=''))"

services:
  backend:
    image: ghcr.io/${GHCR_OWNER:-lojinext}/lojinext-backend:${IMAGE_TAG:?IMAGE_TAG must be set in prod (no :latest)}
    build: !reset null
    environment:
      - ENVIRONMENT=prod
      - UVICORN_WORKERS=${UVICORN_WORKERS:-4}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in prod}
      - REDIS_URL=${REDIS_URL:?REDIS_URL must be set in prod (URL-encoded password)}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:?CELERY_BROKER_URL must be set in prod (URL-encoded password)}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:?CELERY_RESULT_BACKEND must be set in prod (URL-encoded password)}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-15}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-5}
    mem_limit: 4g
    cpus: '2.0'
    memswap_limit: 4g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: always

  frontend:
    image: ghcr.io/${GHCR_OWNER:-lojinext}/lojinext-frontend:${IMAGE_TAG:?IMAGE_TAG must be set in prod (no :latest)}
    build: !reset null
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: always

  worker:
    image: ghcr.io/${GHCR_OWNER:-lojinext}/lojinext-backend:${IMAGE_TAG:?IMAGE_TAG must be set in prod (no :latest)}
    build: !reset null
    environment:
      - ENVIRONMENT=prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in prod}
      - REDIS_URL=${REDIS_URL:?REDIS_URL must be set in prod (URL-encoded password)}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:?CELERY_BROKER_URL must be set in prod (URL-encoded password)}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:?CELERY_RESULT_BACKEND must be set in prod (URL-encoded password)}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-15}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-5}
    healthcheck:
      test:
        [
          "CMD",
          "celery",
          "-A",
          "app.infrastructure.background.celery_app",
          "inspect",
          "ping",
          "--timeout",
          "5",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    mem_limit: 6g
    cpus: '2.0'
    memswap_limit: 6g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: always

  db:
    ports: !reset []
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-lojinext_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in prod}
      - POSTGRES_DB=${POSTGRES_DB:-lojinext_db}
    mem_limit: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: always

  redis:
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in prod}"
      - --appendonly
      - "yes"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - "allkeys-lru"
      - --save
      - "60"
      - "1000"
    ports: !reset []
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: always

  celery-beat:
    image: ghcr.io/${GHCR_OWNER:-lojinext}/lojinext-backend:${IMAGE_TAG:?IMAGE_TAG must be set in prod (no :latest)}
    build: !reset null
    environment:
      - ENVIRONMENT=prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in prod}
      - REDIS_URL=${REDIS_URL:?REDIS_URL must be set in prod (URL-encoded password)}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:?CELERY_BROKER_URL must be set in prod (URL-encoded password)}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:?CELERY_RESULT_BACKEND must be set in prod (URL-encoded password)}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /tmp/celerybeat-schedule && find /tmp/celerybeat-schedule -mmin -5 | grep -q . || exit 1",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 256m
    cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    restart: always

  prometheus:
    ports: !reset []
    mem_limit: 512m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: always

  grafana:
    ports: !reset []
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set in prod}
    mem_limit: 512m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: always

  alertmanager:
    ports: !reset []
    mem_limit: 128m
    cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    restart: always

  celery-exporter:
    ports: !reset []
    command: ["--broker-url=${CELERY_BROKER_URL:?CELERY_BROKER_URL must be set in prod}"]
    mem_limit: 128m
    cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: always

  redis-exporter:
    ports: !reset []
    command: ["--redis.addr=redis:6379", "--redis.password=${REDIS_PASSWORD}"]
    mem_limit: 128m
    cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    restart: always

  postgres-exporter:
    ports: !reset []
    mem_limit: 128m
    cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    restart: always

  ocr-service:
    restart: always
    mem_limit: 3g
    cpus: '1.0'
    ports: !reset []
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  telegram-ops-bot:
    restart: always
    environment:
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set in prod}
    ports: !reset []
    mem_limit: 256m
    cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  telegram-driver-bot:
    restart: always
    environment:
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set in prod}
    mem_limit: 256m
    cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  db-backup:
    # Same digest-pinned postgres:16-alpine as the db service — resolved 2026-06-17.
    image: postgres:16-alpine@sha256:d845e7f0ac8517b9d9868b6d20379f9688ba3676595e50ca7c0b664964b2a760
    depends_on:
      - db
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in prod}
      - POSTGRES_USER=${POSTGRES_USER:-lojinext_user}
      - POSTGRES_DB=${POSTGRES_DB:-lojinext_db}
      - RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backups:/backup/lojinext
    entrypoint: >
      sh -c '
        echo "0 2 * * * pg_dump -h db -U $$POSTGRES_USER -d $$POSTGRES_DB --no-owner --no-privileges --format=custom -f /backup/lojinext/lojinext_\$$(date +%Y%m%d_%H%M%S).dump && find /backup/lojinext -name \"*.dump\" -mtime +$$RETENTION_DAYS -delete" | crontab - &&
        crond -f -l 8
      '
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
