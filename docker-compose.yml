services:
  # Traefik'in Docker provider'ı ham /var/run/docker.sock'a değil, bu
  # read-only proxy'ye bağlanır (2026-07-09 kalıcı-çözüm bulgusu). Kök
  # neden: Windows Docker Desktop/WSL2'nin ham docker.sock köprüsü kronik
  # olarak flaky ("unexpected EOF" / "502 Bad Gateway" — traefik loglarında
  # günler boyunca 50+ kez tekrarlandı, bu host'a özgü bir platform kusuru,
  # uygulama kodundan bağımsız). Her tekrarında Traefik container
  # listesini/etiketlerini senkronize edemiyor ve backend-auth gibi
  # router'lar sessizce config'ten düşüyordu (canlı belirti: login 404
  # atıyordu, backend container'ın kendisi sağlıklıydı). docker-socket-proxy
  # kalıcı/havuzlanmış bir bağlantı üzerinden konuşur — ham soketin
  # flakiness'ine Traefik'in kendisinden çok daha dayanıklı. Read-only:
  # yalnız CONTAINERS+NETWORKS+EVENTS açık, POST=0 (hiçbir yazma izni yok).
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      EVENTS: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - lojinext_network

  # Tier E madde 32: reverse proxy / LB. Replaces nginx's proxy_pass to a
  # single `backend:8000` — that upstream was resolved once at nginx startup
  # and never discovered new replicas, so `docker compose up --scale
  # backend=N` gave zero real load balancing (and no fail-over: a dead
  # replica just 502'd every request routed to its stale IP). Traefik's
  # Docker provider re-discovers `backend`'s containers live and health-checks
  # them, so both scaling and replica failure are handled without any config
  # change or nginx reload. Frontend's nginx keeps ONLY static-file-serving +
  # SPA fallback (see frontend/nginx.conf) — that's not something a reverse
  # proxy does for you, Traefik included.
  traefik:
    # v3.1 was live-tested first and failed with a persistent, empty
    # "Error response from daemon: " on this host's Docker Engine 29.5.3
    # (API 1.54) — root cause (confirmed via traefik/traefik#12253/#12294):
    # Docker 29+ dropped the ancient v1.24 API that Traefik's docker
    # provider negotiated down to on some 3.x builds; the daemon rejects it
    # with an empty body instead of a real error. v3.6 fixes the
    # negotiation — verified live here too ("Provider connection
    # established with docker 29.5.3 (API 1.54)").
    image: traefik:v3.6@sha256:d85749d4d10d970ed2b3a7cb2406d9b9da1cdd6ea975a39c727aab809d73136a
    command:
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://docker-socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.traefik.address=:8080"
      - "--ping=true"
      - "--ping.entrypoint=traefik"
      - "--api.dashboard=false"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      # 8080 (traefik's own /ping + would-be dashboard) intentionally NOT
      # published to the host — internal-only, no public admin surface.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      docker-socket-proxy:
        condition: service_started
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - lojinext_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.services.backend.loadbalancer.healthcheck.path=/api/v1/health/"
      - "traefik.http.services.backend.loadbalancer.healthcheck.interval=10s"
      # Security headers — native fields where Traefik has one, raw
      # customResponseHeaders for CSP/Permissions-Policy (no native field).
      # Same policy as the old nginx.conf (Mapbox tiles, Open-Meteo, JWT in
      # localStorage, injectManifest SW).
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Permissions-Policy=interest-cohort=()"
      - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Content-Security-Policy=default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.mapbox.com; connect-src 'self' wss: https://api.mapbox.com https://events.mapbox.com https://api.open-meteo.com; font-src 'self' data:; worker-src 'self' blob:; frame-ancestors 'none';"
      - "traefik.http.middlewares.gzip-compress.compress=true"
      # Auth brute-force rate limit — 10 req/min average, burst 20 (same
      # budget as the old `limit_req_zone ... rate=10r/m; burst=20 nodelay`).
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.auth-ratelimit.ratelimit.burst=20"
      # Auth router — more specific PathPrefix, higher priority, rate-limited.
      - "traefik.http.routers.backend-auth.rule=PathPrefix(`/api/v1/auth`)"
      - "traefik.http.routers.backend-auth.priority=10"
      - "traefik.http.routers.backend-auth.middlewares=auth-ratelimit,security-headers,gzip-compress"
      - "traefik.http.routers.backend-auth.service=backend"
      # General API + WebSocket router (Traefik handles the Upgrade
      # handshake automatically — no special config needed, unlike nginx).
      - "traefik.http.routers.backend-api.rule=PathPrefix(`/api`) || PathPrefix(`/ws`)"
      - "traefik.http.routers.backend-api.priority=5"
      - "traefik.http.routers.backend-api.middlewares=security-headers,gzip-compress"
      - "traefik.http.routers.backend-api.service=backend"
    env_file:
      - .env
    environment:
      # DATABASE_URL override (use docker DNS 'db' instead of .env's 127.0.0.1)
      # — kept pointing directly at Postgres; Alembic/scripts use this one.
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-lojinext_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}@db:5432/${POSTGRES_DB:-lojinext_db}
      # Tier E madde 30: the running app's async engine connects through
      # pgbouncer instead (see app/database/connection.py + pgbouncer service
      # comment for why DATABASE_URL itself stays direct).
      - DATABASE_URL_POOLED=postgresql+asyncpg://${POSTGRES_USER:-lojinext_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}@pgbouncer:6432/${POSTGRES_DB:-lojinext_db}
      - DB_THROUGH_PGBOUNCER=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      # No-password Redis URLs override the .env values (Redis container has no requirepass)
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      # Tier E madde 31: Redis SPOF fix — discover the master via Sentinel
      # instead of the static `redis` hostname, so a `redis` container failure
      # fails over to `redis-replica` (promoted by quorum) without any app
      # restart. See app/infrastructure/cache/redis_client_factory.py.
      - REDIS_USE_SENTINEL=true
      - REDIS_SENTINEL_HOSTS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - REDIS_SENTINEL_MASTER_NAME=mymaster
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-lojinext_user}
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      # Tier E madde 25: TracerProvider artık gerçekten kuruluyor (app/main.py
      # ::_wire_observability) — spans lokal Tempo'ya (docker-compose 'tempo'
      # servisi) OTLP/gRPC ile export edilir, Grafana'da Explore > Tempo'dan
      # görülebilir. Worker/celery-beat şu an kapsam dışı (Celery instrumentation
      # paketi kurulu değil, ayrı bir efor).
      - OTEL_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      # Phase 5.0 — SeferFuelEstimator aktif (Mapbox + Open-Meteo + physics
      # + adjustment factors). Sefer kaydında yeni pipeline çalışır,
      # tahmin sefer satırında gözükür + route_simulation_id set edilir.
      # Acil geri al: false yap, restart.
      - USE_SEFER_FUEL_ESTIMATOR=true
      # Allow requests from the nginx-served frontend on port 80
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://127.0.0.1
      - HF_HOME=/app/.cache/huggingface
      - HOME=/app
    volumes:
      - app_data:/app/app/data
      - model_data:/app/models
      - hf_cache:/app/.cache/huggingface
      - ./backups:/app/storage/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - lojinext_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
    # Tier E madde 32: no host port — Traefik is the sole public entrypoint
    # now (see `traefik` service comment above).
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      # Catch-all, lowest priority — /api and /ws win via backend's explicit
      # higher-priority routers even though this rule would also match them.
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.routers.frontend.middlewares=security-headers,gzip-compress"
      - "traefik.http.routers.frontend.service=frontend"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - lojinext_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.background.celery_app worker -l info --hostname=lojinext-worker@%h
    env_file:
      - .env
    environment:
      - SERVICE_ROLE=worker
      # DATABASE_URL override (use docker DNS 'db' instead of .env's 127.0.0.1)
      # — kept pointing directly at Postgres; scripts/migrations use this one.
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-lojinext_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}@db:5432/${POSTGRES_DB:-lojinext_db}
      # Tier E madde 30: worker's async engine connects through pgbouncer.
      - DATABASE_URL_POOLED=postgresql+asyncpg://${POSTGRES_USER:-lojinext_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}@pgbouncer:6432/${POSTGRES_DB:-lojinext_db}
      - DB_THROUGH_PGBOUNCER=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_USE_SENTINEL=true
      - REDIS_SENTINEL_HOSTS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - REDIS_SENTINEL_MASTER_NAME=mymaster
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-lojinext_user}
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - OTEL_ENABLED=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - OCR_SERVICE_URL=http://ocr-service:8001
      - BELGELER_UPLOAD_DIR=/belgeler
      # Phase 5.0 — backend ile aynı: worker'lar da bulk import / Celery
      # task'larda yeni sefer yaratırken SeferFuelEstimator kullanır.
      - USE_SEFER_FUEL_ESTIMATOR=true
      - HF_HOME=/app/.cache/huggingface
      - HOME=/app
    volumes:
      - app_data:/app/app/data
      - model_data:/app/models
      - hf_cache:/app/.cache/huggingface
      - ./backups:/app/storage/backups
      - belgeler_data:/belgeler
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
    healthcheck:
      # `celery inspect ping` ağır app modülünü (ML/AI) cold-import ediyor →
      # CLI başlangıcı tek başına >10s sürebilir. Docker timeout + start_period
      # buna göre geniş tutulur; aksi halde çalışan worker yanlışça unhealthy.
      test: ["CMD", "celery", "-A", "app.infrastructure.background.celery_app", "inspect", "ping", "--timeout=10"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - lojinext_network

  db:
    # Digest-pinned postgres:16-alpine (unified with prod; dev was 15.3) — resolved 2026-06-17.
    image: postgres:16-alpine@sha256:d845e7f0ac8517b9d9868b6d20379f9688ba3676595e50ca7c0b664964b2a760
    # max_connections raised 100→200: the multi-service stack (backend async+sync
    # pools, celery worker, beat) summed over the 100 default → TooManyConnections
    # ('too many clients already') on heavy endpoints (Sentry 19K/19J/19M).
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-lojinext_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
      - POSTGRES_DB=${POSTGRES_DB:-lojinext_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lojinext_user} -d ${POSTGRES_DB:-lojinext_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lojinext_network

  pgbouncer:
    # Tier E madde 30 — DB_POOL_SIZE(15)+DB_MAX_OVERFLOW(5)=20 real Postgres
    # connections per backend/worker replica against max_connections=200
    # meant the stack ran out of headroom after roughly 4-5 replicas.
    # PgBouncer (transaction pooling) sits between the app and Postgres:
    # backend/worker keep the same client-side pool size (now connections to
    # pgbouncer, cheap), but pgbouncer multiplexes them onto a small, fixed
    # DEFAULT_POOL_SIZE of REAL Postgres connections regardless of how many
    # app replicas exist upstream — the actual fix for the replica ceiling.
    # Pinned by digest (upstream publishes no semver tag) — resolved 2026-07-02.
    image: edoburu/pgbouncer:latest@sha256:4c1ca296ef525f108f5d3552cc337c0c09587cf8dae7f0067fd93349e47dc1cd
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lojinext_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}@db:5432/${POSTGRES_DB:-lojinext_db}
      - LISTEN_PORT=6432
      - POOL_MODE=transaction
      - AUTH_TYPE=scram-sha-256
      - ADMIN_USERS=${POSTGRES_USER:-lojinext_user}
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=20
      - MIN_POOL_SIZE=5
      - RESERVE_POOL_SIZE=5
      - MAX_PREPARED_STATEMENTS=0
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER:-lojinext_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lojinext_network

  redis:
    # Digest-pinned redis:7-alpine (7.4.9; dev was 7.0.11) — resolved 2026-06-17.
    # Tier E madde 31: this is the Sentinel-monitored primary ("mymaster").
    #
    # Uses redis_ha_entrypoint.sh instead of a static `--replicaof` (or none):
    # live-tested a bare `redis-server` restarting after a Sentinel failover
    # and it does NOT auto-rejoin as a replica — it just boots as an
    # unreplicated master again (split-brain risk), and Sentinel keeps
    # tracking the old, now-dead IP for the demoted node forever since Docker
    # can hand a restarted container a different bridge IP. The entrypoint
    # asks Sentinel who the current master is on every start and slaves
    # itself to that answer; only a true cold boot (Sentinels not up yet)
    # falls back to the static BOOTSTRAP_ROLE.
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    entrypoint: ["sh", "/scripts/redis_ha_entrypoint.sh"]
    environment:
      - BOOTSTRAP_ROLE=master
      - SENTINEL_HOSTS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./scripts/redis_ha_entrypoint.sh:/scripts/redis_ha_entrypoint.sh:ro
      - ./scripts/redis-ha.conf:/etc/redis-ha.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lojinext_network

  redis-replica:
    # Tier E madde 31: async replica of `redis`. Sentinel promotes this to
    # master automatically if `redis` becomes unreachable. See `redis`
    # service comment above for why redis_ha_entrypoint.sh is used instead
    # of a static `--replicaof`.
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    entrypoint: ["sh", "/scripts/redis_ha_entrypoint.sh"]
    environment:
      - BOOTSTRAP_ROLE=replica
      - BOOTSTRAP_TARGET=redis
      - SENTINEL_HOSTS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
    volumes:
      - redis_replica_data:/data
      - ./scripts/redis_ha_entrypoint.sh:/scripts/redis_ha_entrypoint.sh:ro
      - ./scripts/redis-ha.conf:/etc/redis-ha.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lojinext_network

  redis-sentinel-1:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    # Configless sentinel startup: directives passed as a generated conf file
    # (sentinel rewrites this itself on failover — losing it on container
    # restart just means re-discovering `redis` from scratch, no state is
    # load-bearing across restarts for a 3-node quorum).
    #
    # Redis Sentinel's OWN hostname resolver (anetResolve, used once at
    # config-parse time for `sentinel monitor`) fails on this Alpine/musl
    # image with "Failed to resolve hostname 'redis'" even though the same
    # container's `getent hosts redis` resolves it fine — a known
    # Sentinel-on-Alpine quirk (live-reproduced: 3/3 sentinels crash-looped
    # on the literal hostname). Workaround: resolve to an IP via `getent`
    # ourselves and write THAT into sentinel.conf, with `resolve-hostnames
    # yes`/`announce-hostnames yes` so Sentinel accepts hostnames again for
    # all subsequent replica-discovery/failover bookkeeping.
    command: >
      sh -c "MASTER_IP=$$(getent hosts redis | awk '{print $$1}') &&
      printf 'port 26379\nsentinel monitor mymaster %s 6379 2\nsentinel down-after-milliseconds mymaster 5000\nsentinel failover-timeout mymaster 10000\nsentinel parallel-syncs mymaster 1\nsentinel resolve-hostnames yes\nsentinel announce-hostnames yes\n' \"$$MASTER_IP\" > /tmp/sentinel.conf &&
      redis-sentinel /tmp/sentinel.conf"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      - lojinext_network

  redis-sentinel-2:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    # See redis-sentinel-1's comment above for why the master is resolved to
    # an IP via `getent` before being written into sentinel.conf.
    command: >
      sh -c "MASTER_IP=$$(getent hosts redis | awk '{print $$1}') &&
      printf 'port 26379\nsentinel monitor mymaster %s 6379 2\nsentinel down-after-milliseconds mymaster 5000\nsentinel failover-timeout mymaster 10000\nsentinel parallel-syncs mymaster 1\nsentinel resolve-hostnames yes\nsentinel announce-hostnames yes\n' \"$$MASTER_IP\" > /tmp/sentinel.conf &&
      redis-sentinel /tmp/sentinel.conf"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      - lojinext_network

  redis-sentinel-3:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    # See redis-sentinel-1's comment above for why the master is resolved to
    # an IP via `getent` before being written into sentinel.conf.
    command: >
      sh -c "MASTER_IP=$$(getent hosts redis | awk '{print $$1}') &&
      printf 'port 26379\nsentinel monitor mymaster %s 6379 2\nsentinel down-after-milliseconds mymaster 5000\nsentinel failover-timeout mymaster 10000\nsentinel parallel-syncs mymaster 1\nsentinel resolve-hostnames yes\nsentinel announce-hostnames yes\n' \"$$MASTER_IP\" > /tmp/sentinel.conf &&
      redis-sentinel /tmp/sentinel.conf"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    networks:
      - lojinext_network

  prometheus:
    image: prom/prometheus:v2.45.0@sha256:9309deb7c981e8a94584d9ed689fd62f7ac4549d816fd3881550311cf056a237
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - lojinext_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.0.3@sha256:423040d62678074111e4e72d7dcef23480a94eb4f21b9173204d1a5ee972ec59
    env_file:
      - .env
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set (see .env.example)}
    depends_on:
      - prometheus
      - tempo
    networks:
      - lojinext_network
    restart: unless-stopped

  tempo:
    # Tier E madde 25: distributed tracing backend for OTel spans emitted by
    # backend's OTLP exporter (see app/main.py::_wire_observability).
    image: grafana/tempo:2.4.1@sha256:5b9c08f6d8fb43b3b72dfd1252ba4f198b11a245257bf76ee2ca13e243bac565
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200" # Tempo query API
      - "4317:4317" # OTLP gRPC receiver
    networks:
      - lojinext_network
    restart: unless-stopped

  celery-exporter:
    # Pinned by digest (upstream publishes no semver tag) — resolved 2026-06-17.
    image: danihodovic/celery-exporter:latest@sha256:7e4622746e7d07eca0040a476ba4d904383f70ef7f90ef2db68a49bdf4c1b203
    command: ["--broker-url=redis://redis:6379/0"]
    ports:
      - "9808:9808"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lojinext_network
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.86.0@sha256:2e9795be900db073e9475fdb9c5124db309b07a3e4e75a1770705cb03be1a1c8
    command: ["--redis.addr=redis:6379"]
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lojinext_network
    restart: unless-stopped

  postgres-exporter:
    # Pinned by digest (upstream :latest) — resolved 2026-06-17.
    image: prometheuscommunity/postgres-exporter:latest@sha256:e96064f876226d94bb6ce48a4c4b3dd76edba91168ec1ab024e5c4b959310b0f
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-lojinext_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}@db:5432/${POSTGRES_DB:-lojinext_db}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lojinext_network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.25.0@sha256:fd4d9a3dd1fd0125108417be21be917f19cc76262347086509a0d43f29b80e98
    environment:
      # 2026-07-01 prod-grade denetimi P1: ops_bot webhook'ları artık bu
      # secret'ı Authorization: Bearer olarak zorunlu kılıyor (fail-closed).
      # alertmanager.yml statik bir dosya olduğundan (env var interpolation
      # yok), secret'ı doğrudan config'e yazamayız — container başlarken bu
      # env var'dan container-içi geçici bir dosyaya yazılıp
      # credentials_file ile okunur (repo'da hiçbir secret dosyası yer almaz).
      - OPS_WEBHOOK_SECRET=${OPS_WEBHOOK_SECRET:?OPS_WEBHOOK_SECRET must be set (see .env.example)}
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        echo -n "$$OPS_WEBHOOK_SECRET" > /tmp/ops_webhook_secret &&
        exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager
    ports:
      - "9093:9093"
    networks:
      - lojinext_network
    restart: unless-stopped

  ocr-service:
    build:
      context: ./ocr_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - easyocr_models:/root/.EasyOCR
      - belgeler_data:/belgeler
    environment:
      - BELGELER_UPLOAD_DIR=/belgeler
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - lojinext_network
    restart: unless-stopped

  # 0-mock epiği Kategori B — deterministik yerel dış-API stub (Mapbox/
  # OpenRoute/Open-Meteo/Telegram/Groq şekilleri). Sadece "test" profilinde
  # başlar; prod/dev `docker compose up` bunu hiç görmez, davranış değişmez.
  # Test/CI, backend'in *_API_BASE_URL env'lerini bu servise işaret eder.
  api-stub:
    profiles: ["test"]
    build:
      context: ./api_stub
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lojinext_network
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.infrastructure.background.celery_app beat -l info -s /tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      - SERVICE_ROLE=beat
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PASSWORD=
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - REDIS_USE_SENTINEL=true
      - REDIS_SENTINEL_HOSTS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - REDIS_SENTINEL_MASTER_NAME=mymaster
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-lojinext_user}
      - ENVIRONMENT=${ENVIRONMENT:-dev}
      - OTEL_ENABLED=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=
      - HOME=/app
    volumes:
      - app_data:/app/app/data
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
      worker:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lojinext_network

  telegram-ops-bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    environment:
      - BOT_TYPE=ops
      - TELEGRAM_OPS_BOT_TOKEN=${TELEGRAM_OPS_BOT_TOKEN}
      - TELEGRAM_OPS_CHAT_ID=${TELEGRAM_OPS_CHAT_ID}
      - BACKEND_URL=http://backend:8000
      - PROMETHEUS_URL=http://prometheus:9090
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      - OPS_WEBHOOK_SECRET=${OPS_WEBHOOK_SECRET:?OPS_WEBHOOK_SECRET must be set (see .env.example)}
      - OPS_ADMIN_TELEGRAM_IDS=${OPS_ADMIN_TELEGRAM_IDS:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # read-only — prevents container escape via Docker API write ops
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      - prometheus
    networks:
      - lojinext_network
    restart: unless-stopped

  telegram-driver-bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    environment:
      - BOT_TYPE=driver
      - TELEGRAM_DRIVER_BOT_TOKEN=${TELEGRAM_DRIVER_BOT_TOKEN}
      - BACKEND_URL=http://backend:8000
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    volumes:
      - belgeler_data:/belgeler
    depends_on:
      - backend
      - ocr-service
    networks:
      - lojinext_network
    restart: unless-stopped

networks:
  lojinext_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  redis_replica_data:
  app_data:
  model_data:
  prometheus_data:
  grafana_data:
  hf_cache:
  easyocr_models:
  belgeler_data:
  tempo_data:
