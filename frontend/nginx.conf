# Rate limiting zone — auth endpoint brute-force koruması
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# Gzip sıkıştırma
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/truetype
    font/opentype
    application/vnd.ms-fontobject;

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Docker embedded DNS — re-resolve the `backend` service at request time so a
    # backend container restart (new IP) does not strand nginx on a stale upstream
    # (was causing 502 on /api after `docker compose up --force-recreate backend`).
    # Requires the variable proxy_pass form below to take effect.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;
    # CSP — fleet app: JWT in localStorage, Mapbox tiles, Open-Meteo weather, injectManifest SW
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.mapbox.com; connect-src 'self' wss: https://api.mapbox.com https://events.mapbox.com https://api.open-meteo.com; font-src 'self' data:; worker-src 'self' blob:; frame-ancestors 'none';" always;

    # PWA manifest MIME — Safari ve Chrome doğru tip ister
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }

    # Service worker — asla cache'lenmemeli, aksi halde update dağılmaz
    location ~* ^/(sw-push\.js|registerSW\.js|workbox-.*\.js)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # App shell — index.html asla agresif cache'lenmemeli. Aksi halde yeni
    # build'in hash'li asset'leri eski index.html'e ulaşamaz → kullanıcı eski
    # arayüzü görür. Her zaman sunucuyla revalidate edilsin.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Static frontend (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # Auth endpoint — rate limited
    location ~ ^/api/v1/auth {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_req_status 429;

        # Variable upstream → runtime DNS re-resolution (see resolver above).
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API proxy
    location /api {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket proxy
    location /ws {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Error handling
    error_page 429 /429.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    location = /429.html {
        return 429 '{"detail":"Too many requests. Please try again later."}';
        add_header Content-Type application/json;
    }
}
