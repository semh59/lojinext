# Tier E madde 32: this container is now STATIC-FILE-SERVING ONLY.
# Reverse-proxying, rate limiting, gzip, CSP/security headers, and backend
# load balancing all moved to Traefik (docker-compose.yml `traefik` service +
# Docker labels on `backend`) — see docker-compose.yml for why: an
# `upstream backend:8000;` block in open-source nginx is resolved once at
# startup and can't discover new replicas when `backend` is scaled
# (`docker compose up --scale backend=N`), so it never gave real load
# balancing. Traefik's Docker provider re-discovers replicas live and
# health-checks them. nginx keeps only what a reverse proxy can't do for it:
# serving the built SPA with correct cache headers and SPA-fallback routing.

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # PWA manifest MIME — Safari ve Chrome doğru tip ister
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }

    # Service worker — asla cache'lenmemeli, aksi halde update dağılmaz
    location ~* ^/(sw-push\.js|registerSW\.js|workbox-.*\.js)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # App shell — index.html asla agresif cache'lenmemeli. Aksi halde yeni
    # build'in hash'li asset'leri eski index.html'e ulaşamaz → kullanıcı eski
    # arayüzü görür. Her zaman sunucuyla revalidate edilsin.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Static frontend (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
