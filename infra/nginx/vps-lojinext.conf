# VPS-level nginx config — SSL termination + reverse proxy to Docker stack
# Deploy to: /etc/nginx/conf.d/lojinext.conf (on VPS)
# Prerequisites: certbot --nginx -d YOUR_DOMAIN (fills ssl_certificate paths)
#
# Usage:
#   sudo cp infra/nginx/vps-lojinext.conf /etc/nginx/conf.d/lojinext.conf
#   sudo sed -i 's/YOUR_DOMAIN/fleet.example.com/g' /etc/nginx/conf.d/lojinext.conf
#   sudo nginx -t && sudo systemctl reload nginx

limit_req_zone $binary_remote_addr zone=loji_global:20m rate=120r/m;
limit_req_zone $binary_remote_addr zone=loji_auth:10m   rate=10r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # certbot provisions these:
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS (1 year — only enable after confirming SSL works)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Strip Docker-nginx X-Frame-Options to avoid duplicate conflicting headers
    proxy_hide_header X-Frame-Options;
    add_header X-Frame-Options            "DENY"                                        always;
    add_header X-Content-Type-Options     "nosniff"                                     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"    always;

    client_max_body_size 15M;
    server_tokens off;

    # Auth: strict rate limit
    location ~ ^/api/v1/auth {
        limit_req zone=loji_auth burst=10 nodelay;
        limit_req_status 429;
        proxy_pass         http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API + WebSocket (Docker frontend nginx on :80 handles internal routing)
    location /api {
        limit_req zone=loji_global burst=40 nodelay;
        proxy_pass         http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend SPA
    location / {
        proxy_pass         http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    error_page 429 /429.html;
    location = /429.html {
        return 429 '{"error":{"code":"RATE_LIMITED","message":"Too many requests"}}';
        add_header Content-Type application/json always;
    }
}
