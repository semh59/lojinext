[mypy]
ignore_missing_imports = True
no_strict_optional = True
# Pydantic v2 @computed_field decorator'ü @property üzerinde mypy desteklemiyor.
# Bu sadece bir IDE/type-checker false positive; runtime'da Pydantic doğru çalışır.
disable_error_code = prop-decorator

# Test mock'larında SimpleNamespace/MagicMock attr erişimi mypy'yi karıştırır.
[mypy-app.tests.*]
disable_error_code = attr-defined, arg-type, call-arg, union-attr, misc

[mypy-tests.*]
disable_error_code = attr-defined, arg-type, call-arg, union-attr, misc

# One-off utility scripts — not production code, type annotations intentionally loose.
# Mypy scans these when test files import from scripts.*
[mypy-scripts.*]
disable_error_code = attr-defined, arg-type, call-arg, union-attr, misc, var-annotated

# Pydantic v2 BaseSettings: env değişkenleri runtime'da yüklenir,
# mypy kwarg eksiklerini şikayet eder (call-arg).
[mypy-app.config]
disable_error_code = call-arg

# Pydantic field_validator(...) + @classmethod kombi mypy bekleniyor
# tutarsızlık. Runtime'da problemsiz.
[mypy-app.schemas.*]
disable_error_code = misc, assignment

# v2 modül şemaları için aynı suppress (response şemalarının base class'taki
# Literal alanı permissive str ile override edip @field_validator(mode="before")
# ile runtime'da normalize etmesi deseni — dalga 5'te driver şemasına taşınınca
# app.schemas.* glob'undan çıktığı için ortaya çıktı, davranış değişikliği
# değil, taşımadan önce de aynı desendi).
[mypy-v2.modules.*.schemas]
disable_error_code = misc, assignment

# PostGIS Geometry vs LargeBinary fallback — modelde dinamik tip.
[mypy-app.database.models]
disable_error_code = assignment

# ML library'leri (lightgbm, xgboost, statsmodels, torch) tip stub'ları
# eksik ya da yetersiz; sınıf yapıları runtime'da düzgün çalışıyor.
[mypy-app.core.ml.lightgbm_predictor]
disable_error_code = attr-defined, arg-type, assignment, union-attr

[mypy-app.core.ml.time_series_predictor]
disable_error_code = attr-defined, arg-type, assignment, union-attr

[mypy-app.core.ml.advanced_lstm]
disable_error_code = attr-defined, arg-type, assignment, union-attr
