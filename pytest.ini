[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -W ignore::DeprecationWarning --cov-config=pytest.ini
filterwarnings =
    ignore::DeprecationWarning
    ignore:.*SwigPy.*:DeprecationWarning
    ignore:.*swigvarlink.*:DeprecationWarning
    # error::RuntimeWarning
markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests

[coverage:run]
source = app
relative_files = True
omit =
    */test_*.py
    *\test_*.py
    */conftest.py
    *\conftest.py
    app/tests/
    app/scripts/*
    app/migrations/*
    alembic/*

[coverage:report]
omit =
    */test_*.py
    *\test_*.py
    */conftest.py
    *\conftest.py
    app/tests/
    app/scripts/*
    app/migrations/*
    alembic/*
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
# TEST-005: keep in sync with the CI gate (ci.yml passes --cov-fail-under=92,
# which overrides this value). Aligned so local `pytest --cov` enforces the same
# threshold CI does instead of a looser 83.
fail_under = 92
