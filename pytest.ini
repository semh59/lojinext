[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -W ignore::DeprecationWarning --cov-config=pytest.ini
filterwarnings =
    ignore::DeprecationWarning
    ignore:.*SwigPy.*:DeprecationWarning
    ignore:.*swigvarlink.*:DeprecationWarning
    # error::RuntimeWarning
markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests

[coverage:run]
source = app
relative_files = True
omit =
    */test_*.py
    *\test_*.py
    */conftest.py
    *\conftest.py
    app/tests/
    app/scripts/*
    app/migrations/*
    alembic/*

[coverage:report]
omit =
    */test_*.py
    *\test_*.py
    */conftest.py
    *\conftest.py
    app/tests/
    app/scripts/*
    app/migrations/*
    alembic/*
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
# TEST-005 / Tier F madde 37 (2026-07-03): this is the REAL, combined
# unit+integration coverage target (matches CI's final "Combined coverage
# gate" step in ci.yml, which reads the accumulated data from every unit +
# integration pytest invocation in that job and asserts this exact number).
# A single local `pytest --cov` run restricted to only unit-marked tests
# will NOT reach this — 46 test files were reclassified as real
# @pytest.mark.integration (they always touched a real DB, previously
# mislabeled), dropping the unit-only figure to ~86-87%. CI's own unit-test
# step passes an explicit --cov-fail-under=85 to override this value for
# that partial/unit-only lane; every intermediate integration step passes
# --cov-fail-under=0 (also an explicit override) since they only
# accumulate data via --cov-append and are not the real gate. To reproduce
# the true 92% number locally, run the full suite (all markers) in one
# invocation, e.g. `pytest --cov=app --cov-config=pytest.ini` with no `-m`
# filter.
fail_under = 92
