# Tier E madde 31 тАФ shared base config for `redis`/`redis-replica`, mounted
# read-only. redis_ha_entrypoint.sh appends --replicaof at exec time based on
# what Sentinel currently reports, so replication role is NOT set here.
port 6379
maxmemory 256mb
maxmemory-policy allkeys-lru
save ""
appendonly no
